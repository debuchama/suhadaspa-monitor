name: Weekly Schedule Collect

on:
  schedule:
    # JST 10:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4

      - name: Download DB artifact
        uses: actions/cache@v4
        with:
          path: data/suhadaspa.db
          key: suhadaspa-db-${{ github.run_number }}
          restore-keys: |
            suhadaspa-db-

      - name: Run weekly collect
        working-directory: scripts
        run: python weekly_collect.py

      - name: Export dashboard data
        working-directory: scripts
        run: python export_data.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || git rebase --abort
          git add data/
          git diff --staged --quiet || git commit -m "📅 Daily schedule collect $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push || (git pull --rebase && git push)
